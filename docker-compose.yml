# SGC-Web — usa PostgreSQL ya instalado en la VM (GeoNode / catastro_lab).
# El puerto 5432 del host NO se expone de nuevo (evita conflicto con GeoNode).
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      MUNICIPALITY_NAME: ${MUNICIPALITY_NAME:-Mexicali}
      STATE_NAME: ${STATE_NAME:-Baja California}
      DEFAULT_MAP_CENTER_LON: ${DEFAULT_MAP_CENTER_LON:--115.468278}
      DEFAULT_MAP_CENTER_LAT: ${DEFAULT_MAP_CENTER_LAT:-32.624639}
      METRIC_SRID: ${METRIC_SRID:-32611}
      GEONODE_URL: ${GEONODE_URL}
      GEOSERVER_PATH: ${GEOSERVER_PATH:-/geoserver}
      GEONODE_USER: ${GEONODE_USER:-}
      GEONODE_PASSWORD: ${GEONODE_PASSWORD:-}
      GEONODE_WMS_LAYERS: ${GEONODE_WMS_LAYERS:-}
      GEONODE_WMS_LAYER_TITLES: ${GEONODE_WMS_LAYER_TITLES:-}
      GEONODE_SSL_VERIFY: ${GEONODE_SSL_VERIFY:-false}
      GEONODE_SOURCE_LAYER: ${GEONODE_SOURCE_LAYER:-}
      GEONODE_FIELD_CADASTRAL: ${GEONODE_FIELD_CADASTRAL:-clavecatas}
      GEONODE_FIELD_PREDIAL: ${GEONODE_FIELD_PREDIAL:-clavecatas}
      JWT_SECRET: ${JWT_SECRET:-cambie-esta-clave}
      BOOTSTRAP_ADMIN_USER: ${BOOTSTRAP_ADMIN_USER:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin123!}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_API_URL: /api
    depends_on:
      - api
    restart: unless-stopped
